<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#071521;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#01C9C9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#04F6F0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="robotGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c2a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1a2f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#bgGradient)" />
  
  <!-- Humanoid Robot -->
  <g transform="translate(300, 150)">
    <!-- Head -->
    <g transform="translate(0, -140)">
      <ellipse cx="0" cy="0" rx="45" ry="50" fill="url(#robotGradient)" stroke="#04F6F0" stroke-width="2"/>
      <!-- Face screen -->
      <rect x="-35" y="-10" width="70" height="40" rx="5" fill="#071521" stroke="#04F6F0" stroke-width="1"/>
      <!-- Eyes -->
      <circle cx="-15" cy="-20" r="6" fill="#7C4DFF"/>
      <circle cx="15" cy="-20" r="6" fill="#7C4DFF"/>
      <circle cx="-15" cy="-20" r="3" fill="#04F6F0"/>
      <circle cx="15" cy="-20" r="3" fill="#04F6F0"/>
      <!-- Antenna -->
      <line x1="0" y1="-50" x2="0" y2="-70" stroke="#04F6F0" stroke-width="2"/>
      <circle cx="0" cy="-75" r="5" fill="#7C4DFF"/>
    </g>
    
    <!-- Body -->
    <rect x="-40" y="-40" width="80" height="100" rx="10" fill="url(#robotGradient)" stroke="#04F6F0" stroke-width="2"/>
    <!-- Chest display -->
    <rect x="-25" y="-20" width="50" height="30" rx="5" fill="#071521" stroke="#7C4DFF" stroke-width="1"/>
    <circle cx="0" cy="-5" r="8" fill="none" stroke="#04F6F0" stroke-width="1"/>
    
    <!-- Arms -->
    <g transform="translate(-40, -20)">
      <line x1="0" y1="0" x2="-40" y2="30" stroke="#04F6F0" stroke-width="8" stroke-linecap="round"/>
      <circle cx="-45" cy="35" r="10" fill="url(#robotGradient)" stroke="#04F6F0" stroke-width="2"/>
    </g>
    <g transform="translate(40, -20)">
      <line x1="0" y1="0" x2="40" y2="30" stroke="#04F6F0" stroke-width="8" stroke-linecap="round"/>
      <circle cx="45" cy="35" r="10" fill="url(#robotGradient)" stroke="#04F6F0" stroke-width="2"/>
    </g>
    
    <!-- Legs -->
    <g transform="translate(-20, 60)">
      <line x1="0" y1="0" x2="0" y2="80" stroke="#04F6F0" stroke-width="10" stroke-linecap="round"/>
      <rect x="-15" y="80" width="30" height="15" fill="url(#robotGradient)" stroke="#04F6F0" stroke-width="2"/>
    </g>
    <g transform="translate(20, 60)">
      <line x1="0" y1="0" x2="0" y2="80" stroke="#04F6F0" stroke-width="10" stroke-linecap="round"/>
      <rect x="-15" y="80" width="30" height="15" fill="url(#robotGradient)" stroke="#04F6F0" stroke-width="2"/>
    </g>
    
    <!-- Joint highlights -->
    <circle cx="0" cy="-40" r="5" fill="#7C4DFF"/>
    <circle cx="-40" cy="-20" r="5" fill="#7C4DFF"/>
    <circle cx="40" cy="-20" r="5" fill="#7C4DFF"/>
    <circle cx="-20" cy="60" r="5" fill="#7C4DFF"/>
    <circle cx="20" cy="60" r="5" fill="#7C4DFF"/>
  </g>
  
  <!-- Floating circuit elements -->
  <g opacity="0.4">
    <circle cx="100" cy="100" r="3" fill="#04F6F0"/>
    <circle cx="120" cy="80" r="2" fill="#7C4DFF"/>
    <circle cx="480" cy="120" r="3" fill="#04F6F0"/>
    <circle cx="500" cy="90" r="2" fill="#7C4DFF"/>
    <circle cx="450" cy="300" r="3" fill="#04F6F0"/>
    <circle cx="150" cy="320" r="2" fill="#7C4DFF"/>
    <path d="M100,100 Q200,50 300,100" stroke="#04F6F0" stroke-width="1" fill="none" opacity="0.3"/>
    <path d="M500,90 Q400,70 300,100" stroke="#7C4DFF" stroke-width="1" fill="none" opacity="0.3"/>
  </g>
</svg>